<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f23"/>
    </linearGradient>
    <linearGradient id="veil-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d83f2"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  
  <g filter="url(#glow)" opacity="0.8">
    <path d="M35 10 Q45 25, 42 50 Q40 75, 48 90" 
          stroke="url(#veil-glow)" stroke-width="2.5" fill="none" opacity="0.5"/>
    <path d="M42 8 Q52 28, 48 50 Q45 72, 52 92" 
          stroke="url(#veil-glow)" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M50 5 Q60 30, 55 50 Q50 70, 58 95" 
          stroke="url(#veil-glow)" stroke-width="3.5" fill="none" opacity="0.9"/>
    <path d="M58 8 Q68 28, 64 50 Q60 72, 68 92" 
          stroke="url(#veil-glow)" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M65 10 Q75 25, 72 50 Q70 75, 78 90" 
          stroke="url(#veil-glow)" stroke-width="2.5" fill="none" opacity="0.5"/>
  </g>
  
  <ellipse cx="50" cy="50" rx="4" ry="20" fill="#6d83f2" opacity="0.6"/>
  <circle cx="50" cy="50" r="3" fill="#ffffff" opacity="0.9"/>
</svg>
