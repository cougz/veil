name = "veil-frontend"
main = "./dist/_worker.js/index.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

assets = { directory = "./dist", binding = "ASSETS" }

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "veil-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"

# Set these as Secrets in the Cloudflare dashboard (Workers → Settings → Variables and Secrets):
# CF_ACCESS_TEAM_DOMAIN = "https://yourteam.cloudflareaccess.com"
# CF_ACCESS_AUD         = "your-application-audience-tag"
# DOMAIN                = "yourdomain.com"
# APP_NAME, APP_DESCRIPTION, ACCENT_COLOR (optional)
